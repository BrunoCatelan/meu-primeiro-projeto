<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Primeiro Código Salesforce</title>
    <style>
        /* Aqui entra o CSS: a decoração da página */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
            padding: 50px;
        }
        .card {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: inline-block;
        }
        button {
            background-color: #0176d3; /* Azul padrão do Salesforce */
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #014b8c;
        }
    </style>
</head>
<body>

    <!-- Aqui entra o HTML: a estrutura da página -->
    <div class="card">
        <h1>Futuro Dev Salesforce 🚀</h1>
        <p>Estou aprendendo HTML, CSS e JavaScript para dominar o LWC!</p>
        
        <!-- Esse botão vai disparar o nosso JavaScript -->
        <button onclick="enviarMensagem()">Clique Aqui</button>
    </div>

    <!-- Aqui entra o JavaScript: a inteligência da página -->
    <script>
        function enviarMensagem() {
            alert("Parabéns! Você acabou de rodar o seu primeiro código JavaScript!");
        }
    </script>

</body>
</html>
